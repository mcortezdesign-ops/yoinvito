<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cumpleaños Roberto · yoinvito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; font-weight: 400; background: #f5f0eb; color: #2a2522; -webkit-font-smoothing: antialiased; }

    .wrap { max-width: 480px; margin: 0 auto; padding-bottom: 3rem; }

    .paq-badge { text-align: center; padding: 1.25rem; background: #f5f0eb; border-bottom: 0.5px solid #e0d8d0; }
    .paq-badge span { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; padding: 4px 12px; color: #a08878; border: 0.5px solid #e0d8d0; }

    .eyebrow-bar { text-align: center; padding: 1rem; background: #f5f0eb; }
    .eyebrow-bar span { font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase; color: #a08878; }
    .hero { position: relative; overflow: hidden; min-height: 420px; display: flex; align-items: flex-end; background: #3b2f2a; }
    .hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 30%; }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(30,22,18,0.94) 0%, rgba(30,22,18,0.55) 30%, rgba(30,22,18,0) 55%); }
    .hero-content { position: relative; z-index: 1; padding: 2rem 2rem 2.25rem; width: 100%; text-align: center; }
    .hero-number { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 96px; line-height: 1; color: #f5f0eb; display: block; margin-bottom: 0.1rem; }
    .hero-name { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-style: italic; font-size: 30px; color: #f0e4d8; letter-spacing: 0.05em; }
    .ornament { width: 32px; height: 0.5px; background: #a08878; margin: 1.25rem auto; display: block; }
    .date-line { font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: #d8c8b8; }

    .section { padding: 2.25rem 2rem; border-bottom: 0.5px solid #e0d8d0; text-align: center; background: #fff; }
    .section-label { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: #b8a898; margin-bottom: 0.75rem; display: block; }
    .section p { font-size: 17px; line-height: 1.8; color: #4a423c; }
    .section strong { font-weight: 400; color: #2a2522; }

    .map-btn { display: inline-flex; align-items: center; gap: 8px; margin-top: 1rem; padding: 0.6rem 1.5rem; border: 0.5px solid #3b2f2a; background: transparent; color: #3b2f2a; font-family: 'Jost', sans-serif; font-weight: 400; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; }

    .confirm-btn { display: inline-flex; align-items: center; gap: 10px; margin-top: 1.25rem; padding: 0.75rem 2rem; background: #3b2f2a; color: #f5f0eb; font-family: 'Jost', sans-serif; font-weight: 400; font-size: 13px; letter-spacing: 0.1em; text-decoration: none; }

    .cal-btn { display: inline-flex; align-items: center; gap: 8px; margin-top: 0.75rem; padding: 0.65rem 1.5rem; background: transparent; color: #3b2f2a; border: 0.5px solid #3b2f2a; font-family: 'Jost', sans-serif; font-weight: 400; font-size: 12px; letter-spacing: 0.1em; text-decoration: none; cursor: pointer; }

    .btns-row { display: flex; flex-direction: column; align-items: center; }

    .yi-footer { text-align: center; padding: 1.75rem; font-size: 11px; color: #b8a898; letter-spacing: 0.1em; background: #f5f0eb; }
    .yi-footer a { color: #b8a898; text-decoration: none; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="paq-badge"><span>Paquete Aviso</span></div>

  <div class="eyebrow-bar"><span>Cumpleaños</span></div>

  <div class="hero">
    <img src="img/roberto-hero.jpg" alt="Roberto Suárez" />
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <span class="hero-number">50</span>
      <div class="hero-name">Roberto Suárez</div>
      <span class="ornament"></span>
      <p class="date-line">Sábado · 12 de julio · 21:00 hs</p>
    </div>
  </div>

  <div class="section">
    <span class="section-label">El lugar</span>
    <p><strong>Salón La Terraza</strong><br>Av. Corrientes 3247, piso 8<br>Buenos Aires</p>
    <a class="map-btn" href="https://maps.google.com/?q=Av+Corrientes+3247+Buenos+Aires" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Ver en el mapa
    </a>
  </div>

  <div class="section" style="border-bottom:none;">
    <span class="section-label">Confirmá tu asistencia</span>
    <p style="font-size:14px; color:#8a7e72;">Antes del <strong>30 de junio</strong></p>
    <div class="btns-row">
      <a class="confirm-btn" href="https://wa.me/5491144456452?text=Hola+Roberto!+Confirmo+mi+asistencia+a+tu+cumpleaños" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
        Confirmar por WhatsApp
      </a>
      <button class="cal-btn" onclick="addToCalendar()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Agendar en mi calendario
      </button>
    </div>
  </div>

  <div class="yi-footer">
    <a href="../index.html">yoinvito.ar</a> · invitaciones digitales
  </div>

</div>

<script>
  function addToCalendar() {
    const start = '20260712T210000';
    const end = '20260713T010000';
    const title = encodeURIComponent('Cumpleaños de Roberto Suárez');
    const details = encodeURIComponent('Festejamos los 50 de Roberto. ¡Te esperamos!');
    const location = encodeURIComponent('Salón La Terraza, Av. Corrientes 3247, piso 8, Buenos Aires');
    const ics = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
DTSTART:${start}
DTEND:${end}
SUMMARY:Cumpleaños de Roberto Suárez
DESCRIPTION:Festejamos los 50 de Roberto. ¡Te esperamos!
LOCATION:Salón La Terraza, Av. Corrientes 3247, piso 8, Buenos Aires
END:VEVENT
END:VCALENDAR`;
    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'cumpleanos-roberto.ics';
    link.click();
  }
</script>

</body>
</html>
